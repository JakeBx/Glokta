# GarakBoard — Docker Compose stack (5 services, Prefect replaces Celery/Redis)
# Usage: docker compose --env-file docker/.env -f docker/docker-compose.yml up
# Copy docker/.env.docker to docker/.env and fill in your values before first run.

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: garakboard
      POSTGRES_USER: garakboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env (copy from docker/.env.docker)}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garakboard -d garakboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: sqlite+aiosqlite:////prefect/prefect.db
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  prefect-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pipeline
    container_name: garakboard-prefect-worker
    restart: unless-stopped
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      DATABASE_URL: postgresql://garakboard:${POSTGRES_PASSWORD}@postgres:5432/garakboard
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in docker/.env}
      OPENROUTER_RPM_LIMIT: ${OPENROUTER_RPM_LIMIT:-60}
      GARAK_PARALLEL_ATTEMPTS: ${GARAK_PARALLEL_ATTEMPTS:-10}
      GARAK_SOFT_PROBE_PROMPT_CAP: ${GARAK_SOFT_PROBE_PROMPT_CAP:-50}
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://garakboard:${POSTGRES_PASSWORD}@postgres:5432/garakboard
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in docker/.env}
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_BASE_URL: http://api:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    command: ["python", "-m", "garakboard.frontend.gradio_app"]
    environment:
      DATABASE_URL: postgresql://garakboard:${POSTGRES_PASSWORD}@postgres:5432/garakboard
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in docker/.env}
      API_BASE_URL: http://api:8000
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "7860:7860"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  prefect_data:
